# Difficulty pre-registered BEFORE seeing our model results.
#
# Source basis:
# - Hendrycks et al. (2021), Measuring Massive Multitask Language Understanding (MMLU).
# - Approximate amateur-human / reported accuracy bands commonly cited for MMLU subjects.
# - We bucket subjects by approximate human/amateur difficulty:
#     hard   : typically low accuracy (< ~50%)
#     medium : mid-band (~50–70%)
#     easy   : typically higher accuracy (> ~70%)
#
# IMPORTANT: These are stratified proxies, not replications of Lichtenstein et al.'s
# exact hard-easy paradigm. Treat human-baseline comparisons as qualitative.

source: >
  Proxied from MMLU subject difficulty patterns reported/discussed in Hendrycks et al. (2021)
  and subsequent public MMLU eval summaries. Documented for NSRI reproducibility.

tiers:
  easy:
    - sociology
    - high_school_us_history
    - high_school_world_history
    - high_school_european_history
    - high_school_geography
    - high_school_government_and_politics
    - high_school_psychology
    - world_religions
    - prehistory
    - elementary_mathematics
    - conceptual_physics
    - high_school_biology
  medium:
    - college_biology
    - high_school_chemistry
    - high_school_physics
    - high_school_statistics
    - high_school_macroeconomics
    - high_school_microeconomics
    - professional_psychology
    - philosophy
    - moral_disputes
    - jurisprudence
    - logical_fallacies
    - us_foreign_policy
    - security_studies
    - international_law
    - astronomy
    - computer_security
  hard:
    - abstract_algebra
    - college_mathematics
    - college_physics
    - college_chemistry
    - formal_logic
    - econometrics
    - machine_learning
    - electrical_engineering
    - moral_scenarios
    - high_school_mathematics
